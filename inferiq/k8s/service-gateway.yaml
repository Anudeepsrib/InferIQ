# Gateway service (ClusterIP + optional NodePort)
apiVersion: v1
kind: Service
metadata:
  name: inferiq-gateway
  namespace: inferiq
  labels:
    app: inferiq-gateway
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: inferiq-gateway

---
# Gateway NodePort service (optional - for external access)
apiVersion: v1
kind: Service
metadata:
  name: inferiq-gateway-nodeport
  namespace: inferiq
  labels:
    app: inferiq-gateway
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080
      protocol: TCP
      name: http
  selector:
    app: inferiq-gateway

---
# vLLM backend service
apiVersion: v1
kind: Service
metadata:
  name: vllm-service
  namespace: inferiq
  labels:
    app: inferiq-vllm
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: inferiq-vllm

